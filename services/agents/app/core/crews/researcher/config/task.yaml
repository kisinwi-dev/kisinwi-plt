researcher_task:
  agent: researcher
  description: |
    Сгенерируй гипотезы для улучшения ML модели на основе предоставленных данных.

    ВХОДНЫЕ ПАРАМЕТРЫ:
    
    Бизнес требования к модели: 

    {business_requirements}

    Информация о датасете:
    
    {dataset_info}

    Информация от ML инженера если предыдущие гипотезы были отвергнуты (опционально):

    {denied_hypotheses_info}

    АЛГОРИТМ ДЕЙСТВИЙ:
    1. Вызови инструмент MLModelsSearcher, чтобы узнать информацию об обученных нами ранее моделях
    2. Сравни текущие метрики с бизнес-требованиями - определи разрыв (gap)
    3. При необходимости используй инструмент PraxisSearcher и узнай лучшие практики из интернета
    4. Вызови инструмент GetExampleJSONTrainer, что бы понять на что мы можем влиять
    5. Сформулируй 3 конкретные гипотезы для улучшения
    6. Учитывай отвергнутые гипотезы (если есть) - не предлагай их снова

    ФОРМАТ ГИПОТЕЗЫ:
    - Гипотеза: что именно предлагаешь изменить
    - Обоснование: почему это сработает
    - Ожидаемый прирост: в % 

    КРИТЕРИИ ХОРОШЕЙ ГИПОТЕЗЫ:
    - Конкретная и проверяемая
    - Основана на реальных данных из инструментов
    - Указывает ожидаемый эффект
    - Учитывает бизнес-требования

    ТРЕБОВАНИЕ: НЕ ПРЕДЛАГАЙ АУГМЕНТИРОВАНИЕ !!!

  expected_output: |
    Верни результат на русском в формате ResearcherOutput с полями:
    - analysis_summary: краткий анализ текущей ситуации
    - hypothesis_1: гипотеза 1 (с описанием, обоснованием, ожидаемым приростом)
    - hypothesis_2: гипотеза 2 (с описанием, обоснованием, ожидаемым приростом)
    - hypothesis_3: гипотеза 3 (с описанием, обоснованием, ожидаемым приростом)
