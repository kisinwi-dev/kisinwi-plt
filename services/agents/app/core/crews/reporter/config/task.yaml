reporter_task:
  agent: reporter
  description: |
    Summarize the FINAL result of the iterative training cycle.

    AVAILABLE DATA:
    - Trained model IDs: {models_id}
    - Discussion ID: {discussion_id}
    - Original business requirements / target metrics: {business_requirements}
    - Production server technical capabilities: {deployment_constraints}

    DATA-GATHERING ALGORITHM (strictly in order, ONLY via tools):

    1. Call GetAgentHistory with discussion_id={discussion_id} — get the agents'
       reasoning and the iteration history (what was changed and why).
    2. For EACH model in {models_id}:
       - first DoesModelHaveMetrics — whether it has metrics;
       - if it does — GetMetricsForModel (per-epoch metrics, train/val/test);
       - GetModelDetails — architecture and training configuration.
    3. Compare the obtained metrics against the business requirements and production constraints.

    If a model has no metrics or a tool error occurs, state it explicitly and continue
    analyzing the remaining models.

    YOUR TASKS:

    1. TASK FULFILLMENT ASSESSMENT:
      - How well the models were trained in each iteration
      - Progress or regression between iterations
      - Which tasks were NOT achieved or achieved poorly

    2. TRAINING HISTORY (short recap):
      - What was done in each iteration (which changes)
      - What results were obtained
      - Key points of improvement/degradation

    3. PRODUCTION VERDICT:
      - Is the model production-ready? Use one of the Russian values: "ДА" / "НЕТ" / "УСЛОВНО"
      - Which criteria are met
      - Which criteria are NOT met
      - Risks of using it in production

    PRODUCTION-READINESS CRITERIA:
    - Target metrics achieved (accuracy, f1, etc.)
    - No overfitting (train/val gap no more than 5-7%)
    - Stability on the test split
    - No critical class imbalance

    IMPORTANT:
    - The verdict MUST be clear: "ДА" / "НЕТ" / "УСЛОВНО"
    - If "УСЛОВНО" or "НЕТ" — state the reasons
    - The short history recap is no more than 5-7 sentences

  expected_output: |
    Your answer must be strictly valid JSON matching the ReporterOut schema.
