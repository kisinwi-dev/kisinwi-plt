reporter_task:
  agent: reporter
  description: |
    Подведи ИТОГОВЫЙ результат цикла итерационного обучения.

    ДОСТУПНЫЕ ДАННЫЕ:
    - ID обученных моделей: {models_id}
    - ID дискуссии: {discussion_id}
    - Исходные бизнес-требования / целевые метрики: {business_requirements}
    - Технические возможности production сервера: {deployment_constraints}

    АЛГОРИТМ СБОРА ДАННЫХ (строго по порядку, ТОЛЬКО через инструменты):

    1. Вызови GetAgentHistory с discussion_id={discussion_id} — получи ход
       рассуждений агентов и историю итераций (что и почему меняли).
    2. Для КАЖДОЙ модели из {models_id}:
       - сначала DoesModelHaveMetrics — есть ли метрики;
       - если есть — GetMetricsForModel (метрики по эпохам, train/val/test);
       - GetModelDetails — архитектура и конфигурация обучения.
    3. Сопоставь полученные метрики с бизнес-требованиями и условиями прода.

    Если по модели нет метрик или произошла ошибка инструмента — укажи это явно
    и продолжай разбирать остальные модели.

    ТВОИ ЗАДАЧИ:

    1. ОЦЕНКА ВЫПОЛНЕНИЯ ЗАДАЧ:
      - Насколько хорошо обучены модели в каждой итерации
      - Прогресс или регресс между итерациями
      - Какие задачи НЕ выполнены или выполнены плохо

    2. ИСТОРИЯ ОБУЧЕНИЯ (краткий пересказ):
      - Что делали в каждой итерации (какие изменения)
      - Какие результаты получили
      - Ключевые точки улучшения/ухудшения

    3. PRODUCTION-ВЕРДИКТ:
     - ГОТОВА модель к проду? ДА/НЕТ/УСЛОВНО
     - Какие критерии выполнены
      - Какие критерии НЕ выполнены
      - Риски при использовании в проде

    КРИТЕРИИ PRODUCTION-ГОТОВНОСТИ:
    - Достигнуты целевые метрики (accuracy, f1 и т.д.)
    - Нет переобучения (разрыв train/val не более 5-7%)
    - Стабильность на тестовой выборке
    - Нет критического дисбаланса по классам

    ВАЖНО:
    - Вердикт ДОЛЖЕН быть чётким: "ДА" / "НЕТ" / "УСЛОВНО"
    - Если "УСЛОВНО" или "НЕТ" — указать причины
    - Краткий пересказ истории — не более 5-7 предложений
    - ТЫ НЕ ПРЕДУМЫВАЕШЬ ДАННЫЕ! ТЫ ИСПОЛЬЗУЕШЬ ИМЕЮЩИЕСЯ ИНСТРУМЕНТЫ

  expected_output: |
    Твой ответ должен быть строго в формате JSON, соответствующем схеме ReporterOut