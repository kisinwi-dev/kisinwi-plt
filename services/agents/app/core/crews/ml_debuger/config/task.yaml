ml_debuger_task:
  agent: ml_debuger
  description: |
    Другой ML инженер запускал обучение и получил ошибку от сервиса тренировок.

    Ошибка: {error}

    Конфигурации обучения, которые он использовал: {config}

    АЛГОРИТМ ТВОИХ ДЕЙСТВИЙ (строго по порядку):

    1. ПРОАНАЛИЗИРУЙ ОШИБКУ
      - Определи тип ошибки (память, валидация, сеть, доступность данных)
      - Найди конкретный параметр, который вызывает проблему

    2. СОБЕРИ НЕОБХОДИМУЮ ИНФОРМАЦИЮ (вызови инструменты):
      - GetDatasetInfo и ListDatasets — чтобы просмотреть наличие датасета и его id
      - GetInfoDevice — чтобы знать, на чём будем обучать
      - GetAllAvailableModels — чтобы проверить существование модели
      - GetExampleJSONTrainer — чтобы получить правильную структуру JSON
       
    3. ПРИМИ РЕШЕНИЕ:
       
      Если ошибка ИСПРАВЛЯЕТСЯ изменением конфигурации:
      - decision = true
      - Измени ТОЛЬКО параметры в конфигурации, которые вызывают ошибку
       
      Если ошибка НЕ ИСПРАВЛЯЕТСЯ изменением конфигурации:
      - decision = false
      - ml_model = null
      - Чётко объясни, почему ты не можешь это исправить

    4. ОБОСНУЙ РЕШЕНИЕ:
      - Какая была ошибка
      - Что именно ты изменил и почему
      - Как это решит проблему

    КРИТИЧЕСКИ ВАЖНО:
    - НЕ ИЗМЕНЯЙ параметры, которые не связаны с ошибкой!
    - НЕ ВЫДУМЫВАЙ оптимизаторы и планировщики — только из инструментов!
    - Если error пустой или неинформативный возвращай decision = false

  expected_output: |
    Твой ответ должен быть строго в формате JSON, соответствующем схеме MlDebugerOut.