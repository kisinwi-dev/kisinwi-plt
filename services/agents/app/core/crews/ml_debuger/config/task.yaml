ml_debuger_task:
  agent: ml_debuger
  description: |
    Another ML engineer started training and got an error from the training service.

    Error: {error}

    The training configuration they used: {config}

    YOUR ALGORITHM (strictly in order):

    1. ANALYZE THE ERROR
      - Determine the error type (memory, validation, network, data availability)
      - Find the specific parameter that causes the problem

    2. GATHER THE REQUIRED INFORMATION (call tools):
      - GetDatasetDetails and ListAllDatasets — to check the dataset exists and its id
      - GetDeviceInfo — to know what we will train on
      - GetAllAvailableModels — to verify the model exists
      - GetExampleTrainingConfig — to get the correct JSON structure

    3. MAKE A DECISION:

      If the error IS fixable by changing the configuration:
      - decision = true
      - Change ONLY the parameters in the configuration that cause the error

      If the error is NOT fixable by changing the configuration:
      - decision = false
      - ml_model = null
      - Clearly explain why you cannot fix it

    4. JUSTIFY THE DECISION:
      - What the error was
      - What exactly you changed and why
      - How it solves the problem

    CRITICALLY IMPORTANT:
    - DO NOT change parameters unrelated to the error!
    - DO NOT invent optimizers and schedulers — only from tools!
    - If error is empty or uninformative, return decision = false

  expected_output: |
    Your answer must be strictly valid JSON matching the MlDebugerOut schema.
