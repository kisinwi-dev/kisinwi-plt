ml_engineer_task:
  agent: ml_engineer
  description: |
    Оцени предложение Researcher и прими решение.

    ВХОДНЫЕ ДАННЫЕ:

    Требования бизнеса к модели: 
    {business_requirements}
    
    УСЛОВИЯ ЭКСПЛУАТАЦИИ (как и где будет работать модель после обучения):

    - На каком оборудовании будет работать модель (GPU/CPU)
    - Требования к скорости работы
    - Ограничения по памяти
    - Бюджет времени на инференс
    
    Это НЕ требования к оборудованию для обучения!
    Это требования к тому, как модель будет использоваться в продакшене.

    {deployment_constraints}

    Информация о датасете: 
    {dataset_info}

    Информация от resercher для запуска обучения: 
    {researcher_proposals}

    АЛГОРИТМ:
    1. Вызови get_info_device и проверь можем ли мы обучить модель с такой архитектурой
    2. Вызови get_type_and_name_models и проверь есть ли у нас предложенная архитектура
    3. Оцени,повзаоляет ли предложенная архитектура техническим требованиям (скорость, память, размер модели)
    4. Прими решение: запускать обучение или нет
    5. Если да, то создай конфигурацию через get_example_run_config_trainer_json

    Названия всех оптимизаторов и планировщиков используй строго из полученных данных 
    из инструментов.

    ВАЖНО: Технические требования описывают, как модель будет использоваться 
    после обучения (инференс).

  expected_output: |
    Твой ответ должен быть строго в формате JSON, который соответствует схеме:
      
    {
      "decision": true/false,
      "reason": "Развёрнутое обоснование решения",
      "ml_model": {
        "description_model": "Описание модели",
        "type": "тип модели (например, CNN, ResNet, Transformer)",
        "configuration": "JSON конфигурация для обучения"
      },
      "recommendations": "Рекомендации по улучшению"
    }
    
    ВАЖНО:
    - Если decision == false, то ml_model должен быть null
    - Если decision == true, ml_model обязателен
    - configuration должен быть валидным JSON, полученным из get_example_run_config_trainer_json
    - Используй ТОЛЬКО те оптимизаторы и планировщики, которые вернули инструменты
    - Не добавляй пояснений вне JSON — только чистый JSON объект
    
    Пример ответа при успехе:
    {
      "decision": true,
      "reason": "ResNet50 подходит по требованиям к памяти и скорости",
      "ml_model": {
        "description_model": "ResNet50 для классификации эмоций",
        "type": "CNN",
        "configuration": "{\"model_name\": \"resnet50\", \"batch_size\": 32, ...}"
      },
      "recommendations": "Использовать аугментацию данных"
    }
    
    Пример ответа при отказе:
    {
      "decision": false,
      "reason": "Требования к инференсу (<10ms) невыполнимы для ResNet50",
      "ml_model": null,
      "recommendations": "Рассмотреть MobileNet или EfficientNet"
    }