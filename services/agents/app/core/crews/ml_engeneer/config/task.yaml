ml_engineer_task:
  agent: ml_engineer
  description: |
    Assess the Researcher's proposal and make a decision.

    # INPUT DATA:

    ## Business requirements for the model

    {business_requirements}

    ## DEPLOYMENT CONSTRAINTS (how and where the model will run after training)

    - What hardware the model will run on (not train on): GPU/CPU
    - Inference speed requirements
    - Memory limits

    {deployment_constraints}

    Note:
    - These are NOT requirements for the training hardware!
    - These describe how the model will be used in production.

    ## Dataset information:

    {dataset_info}

    ## Dataset and version IDs

    Use them both to call GetDatasetDetails and to fill the training configuration
    (the fields that reference the dataset and its version).

    - Dataset ID: {dataset_id}
    - Dataset version ID: {dataset_version_id}

    ## Researcher's proposals for launching training:

    {researcher_proposals}

    ## History of previous model versions

    {model_history}

    If the history is not empty, you are continuing training of an EXISTING model
    (a new version is created). Study the previous configurations and metrics: do
    not repeat the configurations of failed versions, build on the best version and
    deliberately improve it.

    This is an IMAGE CLASSIFICATION task.

    ## DECISION POLICY

    Follow the standard algorithm. You may refuse (decision = false) if training is
    not worthwhile: production requirements are infeasible for the available
    architectures, the researcher's hypotheses are unsuitable, etc.

    ## YOUR ALGORITHM

    1. Call GetDeviceInfo — this is the TRAINING hardware. Remember the device: its
       value goes into the config as "cuda" (if a GPU is available) or "cpu". Do NOT
       use "cuda:0".
    2. Call GetAllAvailableModels and check whether the proposed architecture exists.
    3. Account for the production requirements (deployment_constraints) when CHOOSING
       the architecture (speed, memory, model size). These requirements concern
       inference in production; they affect the CHOICE of architecture, not the
       training device. By themselves they are NOT grounds for refusal — make a
       refusal decision only according to the "DECISION POLICY" section.
    4. Check that the dataset exists: call GetDatasetDetails with ID {dataset_id}.
       Then check that the required version exists: call GetDatasetVersionDetails with
       ID {dataset_id} and version {dataset_version_id}.
       If the dataset or version is not found (the tool returned an error), training
       MUST NOT start: return decision = false and state in reason exactly what is missing.
    5. Make the decision: start training or not.
    6. If yes, review the available metrics with GetMetricsForTrainer.
    7. If yes, create the configuration via GetExampleTrainingConfig and fill it in:
       - model name — from GetAllAvailableModels (timm);
       - put the real {dataset_id} and {dataset_version_id} into the dataset/version
         fields (not the placeholder values from the example);
       - device — from step 1 ("cuda" or "cpu");
       - optimizers/schedulers/metrics — strictly from the tool responses.
    8. You MUST validate the finished configuration with ValidateTrainingConfig.
       If valid == false, fix the configuration according to the errors list and
       validate again. Do not return a configuration that did not pass validation.

    Use the names of all optimizers and schedulers strictly as returned by the tools.

  expected_output: |
    Your answer must be strictly valid JSON matching this schema:

    {
      "decision": true/false,
      "reason": "Detailed justification of the decision",
      "ml_model": {
        "description_model": "Model description",
        "type": "model type (e.g. CNN, ResNet, Transformer)",
        "configuration": "JSON training configuration"
      },
      "recommendations": "Recommendations for improvement"
    }

    IMPORTANT:
    - If decision == false, ml_model must be null
    - If decision == true, ml_model is required
    - configuration is valid JSON following the structure from GetExampleTrainingConfig
      (do not invent the structure — take it from the tool response)
    - configuration must pass ValidateTrainingConfig (valid == true) before you return it
    - In configuration put the real {dataset_id} and {dataset_version_id} into the
      dataset/version fields, and set the device to "cuda" or "cpu" (not "cuda:0")
    - Use ONLY the optimizers and schedulers returned by the tools
    - Do not add any explanation outside the JSON — only a clean JSON object

    Example of a success answer (configuration shortened — yours is the full one from the tool):
    {
      "decision": true,
      "reason": "ResNet50 fits the memory and speed requirements",
      "ml_model": {
        "description_model": "ResNet50 for image classification",
        "type": "CNN",
        "configuration": "<full JSON from GetExampleTrainingConfig with real dataset_id/version_id and device>"
      },
      "recommendations": "Use data augmentation"
    }

    Example of a refusal answer (only if allowed by the "DECISION POLICY" section —
    e.g. the dataset/version is not found or training is not worthwhile):
    {
      "decision": false,
      "reason": "The dataset version was not found — there is nothing to train",
      "ml_model": null,
      "recommendations": "Check that the dataset version ID is correct"
    }
