dataset_analyst_task:
  agent: dataset_analyst
  description: |
    Analyze the dataset.

    Use the following parameters:

    Dataset ID: {dataset_id}
    Dataset version ID: {dataset_version_id}

    YOUR TASKS:
    - Assess dataset quality
    - Find possible problems
    - Assess training readiness
    - Point out limitations and risks
    - Provide recommendations

    IMPORTANT:
    - If the specified version cannot be found, the dataset is NOT ready for training
    - Use the available tools
    - Work ONLY with the specified dataset
    - Do NOT copy the dataset/version ids into your description — the platform
      tracks them itself; focus the description on the data and its quality

  expected_output: |
    Your answer must be strictly valid JSON matching the DatasetAnalystOut schema.

    IMPORTANT:
    - readiness_assessment: true if the dataset is ready for training, false otherwise
    - found_issues and recommendations are ARRAYS of strings: one item per point
      (do not merge them into a single string and do not number them manually)

    {output_format}
