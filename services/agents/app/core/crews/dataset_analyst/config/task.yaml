dataset_analyst_task:
  agent: dataset_analyst
  description: >
    Проведи анализ датасета.

    Используй следующие параметры:

    ID датасета: {dataset_id}
    ID версии датасета: {dataset_version_id}

    ТВОИ ЗАДАЧИ:
    - Оценить качество датасета
    - Найти возможные проблемы
    - Оценить готовность к обучению
    - Указать ограничения и риски
    - Дать рекомендации

    ВАЖНО:
    - Используй доступные инструменты
    - Не придумывай данные
    - Работай ТОЛЬКО с указанным датасетом
    - Если информации недостаточно - сообщи об этом

  expected_output: >
    Структурированный отчет по датасету, содержащий:

    - Краткое описание
    - Оценку качества
    - Найденные проблемы
    - Риски
    - Рекомендации
    - Финальную оценку готовности к обучению
  