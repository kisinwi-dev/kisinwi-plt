metrics_analysis_task:
  agent: metrics_analyst

  description: |
    Analyze the metrics of a trained model and decide whether the business
    requirements are met.

    Business requirements:
    {business_goal}

    Model metrics and details:
    {metrics_data}

    YOUR TASKS:
    - Analyze model quality from the metrics above
    - Explain the meaning of the metrics
    - Identify the model's weak points
    - Compare the metrics against the Business requirements and decide whether
      the requirements are met — i.e. whether another training stage is needed
      (requirements_met=false) or the model is good enough (requirements_met=true)

    IMPORTANT:
    - Use only the metrics provided above; do not invent numbers
    - If the data is insufficient, say so and set requirements_met=false

  expected_output: >
    A structured verdict with fields:
    - requirements_met (bool): true if the model satisfies the business
      requirements and no further training stage is needed; false otherwise
    - reason (str): justification of the verdict against the requirements
    - analysis (str): detailed interpretation of the metrics and weak points

    {output_format}
