metrics_analysis_task:
  agent: metrics_analyst

  description: |
    Retrieve and analyze the metrics of a model by its ID.

    Model ID: {model_id}

    Business requirements:
    {business_goal}

    YOUR TASKS:
    - Retrieve the model metrics via tools (strictly in this order):
      1. DoesModelHaveMetrics — check whether the model has any metrics at all
      2. if it does — GetMetricsForModel (per-epoch metrics, train/val/test)
      3. GetModelDetails — architecture and model details for context
    - Analyze model quality
    - Explain the meaning of the metrics
    - Identify the model's weak points
    - Give a conclusion about production readiness

    IMPORTANT:
    - Use only the real metrics returned by tools
    - If the data is insufficient, say so

  expected_output: >
    A structured analysis of the model:
    - Quality interpretation
    - Weak points
    - Conclusion about readiness for use
