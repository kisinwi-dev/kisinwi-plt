metrics_analysis_task:
  agent: metrics_analyst

  description: |
    Получи и проанализируй метрики модели по её ID.

    ID модели: {model_id}

    Требования бизнеса: 
    {business_goal}    

    ТВОИ ЗАДАЧИ:
    - Получить метрики модели через инструменты
    - Проанализировать качество модели
    - Объяснить значение метрик
    - Выявить слабые стороны модели
    - Дать вывод о готовности к продакшену

    ВАЖНО:
    - Используй только реальные метрики
    - Не выдумывай значения
    - Если данных недостаточно — сообщи об этом

  expected_output: >
    Структурированный анализ модели:
    - Интерпретация качества
    - Слабые стороны
    - Вывод о готовности к использованию