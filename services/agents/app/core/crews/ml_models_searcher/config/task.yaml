ml_models_searcher_task:
  agent: ml_models_searcher
  description: |
    Use the tools to retrieve information about the models and their metrics.

    Request parameters:
    - model_ids: {model_ids} (may be empty, then you search among all available models)

    Additional context:
    {context}

    What to do:
    1. Get the data for each id; if there is no id, search among all available models
    2. Analyze the obtained data
    3. Fill in MLModelsSearcherOutput

    PROHIBITIONS:
    - Do not answer without calling GetModelDetails and GetMetricsForModel
    - If there are no models, do not invent them

    IF YOU GET AN ERROR WHILE RETRIEVING A SPECIFIC MODEL, POINT IT OUT AND CONTINUE
    ANALYZING THE OTHER MODELS. IN THE ANSWER, STATE THAT THERE WAS AN ERROR WITH THAT MODEL.

  expected_output: |
    The result must strictly match the MLModelsSearcherOutput Pydantic model:
    {
        "text": "Detailed analysis of each model with metrics, comparison and conclusions",
        "summary": "Short conclusion about the best model and a recommendation",
        "metrics_summary": [
            {
                "model_name": "Model name and its version",
                "summary_metric_info": "Short info about the model's most significant metrics on the test data"
            }
        ]
    }
    IMPORTANT: metrics_summary is a LIST of objects with the fields model_name and
    summary_metric_info (one object per model), not a dictionary.
