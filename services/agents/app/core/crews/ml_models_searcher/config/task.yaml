ml_models_searcher_task:
  agent: ml_models_searcher
  description: |
    Используй инструменты и получи информацию по моделям и их метрики.
    
    Параметры запросов:
    - model_ids: {model_ids} (может быть пустым, тогда ты ищешь среди всех имеющихся моделей)
    
    Дополнительный контекст:
    {context}
    
    Что нужно сделать:
    1. Получи данные по каждому id, если id нету ищи среди всех доступных
    2. Проанализируй полученные данные
    3. Заполни MLModelsSearcherOutput

    ЗАПРЕТЫ:
    - Не отвечай без вызова GetModelDetails и GetMetricsForModel
    - Не придумывай модели
    - Не выдумывай метрики
    - Если моделей нет, то не придумывай их

    ЕСЛИ ПОЛУЧИШЬ ОШИБКУ ПРИ ПОЛУЧЕНИИ ИНФОРМАЦИИ КОНКРЕТНОЙ МОДЕЛИ УКАЖИ НА ЭТО И
    ПРОДОЛЖАЙ РАЗБИРАТЬ МОДЕЛИ. В ОТВЕТЕ УКАЖИ, ЧТО БЫЛА ОШИБКА С ТАКОЙ МОДЕЛЬЮ.
    
  expected_output: |
    Результат должен быть строго в формате Pydantic модели MLModelsSearcherOutput:
    {
        "text": "Подробный анализ каждой модели с метриками, сравнением и выводами",
        "summary": "Краткий вывод о лучшей модели и рекомендация",
        "metrics_summary": [
            {
                "model_name": "Имя модели и её версия",
                "summary_metric_info": "Краткая информация о самых значимых метриках модели на тестовых данных"
            }
        ]
    }
    ВАЖНО: metrics_summary — это СПИСОК объектов с полями model_name и
    summary_metric_info (по одному объекту на модель), а не словарь.