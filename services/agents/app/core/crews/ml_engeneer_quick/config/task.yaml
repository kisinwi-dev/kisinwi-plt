ml_engineer_quick_task:
  agent: ml_engineer_quick
  description: |
    БЫСТРЫЙ ПРОГОН. Researcher не участвует — конфигурацию обучения предлагаешь
    самостоятельно. Прими решение и собери валидный конфиг.

    # ВХОДНЫЕ ДАННЫЕ:

    ## Требования бизнеса к модели

    {business_requirements}

    ## УСЛОВИЯ ЭКСПЛУАТАЦИИ (как и где будет работать модель после обучения)

    - На каком оборудовании будет работать(не обучаться) модель (GPU/CPU)
    - Требования к скорости работы
    - Ограничения по памяти

    {deployment_constraints}

    Дополнительно:
    - Это НЕ требования к оборудованию для обучения!
    - Это требования к тому, как модель будет использоваться в продакшене.

    ## Информация о датасете:

    {dataset_info}

    ## ID датасета и версии

    Используй их и для вызова GetDatasetDetails, и для подстановки в конфигурацию
    обучения (в поля, отвечающие за датасет и его версию).

    - ID датасета: {dataset_id}
    - ID версии датасета: {dataset_version_id}

    ## История предыдущих версий модели

    {model_history}

    Если история не пуста — ты дообучаешь СУЩЕСТВУЮЩУЮ модель (создаётся новая
    версия). Изучи прошлые конфигурации и метрики: не повторяй конфигурации
    провальных версий, отталкивайся от лучшей версии и целенаправленно улучшай её.

    Это задача КЛАССИФИКАЦИИ ИЗОБРАЖЕНИЙ.

    ## ПОЛИТИКА РЕШЕНИЯ

    Это БЫСТРЫЙ ПРОГОН. Отказываться от обучения по причинам качества, рисков
    или жёсткости требований прода ЗАПРЕЩЕНО. Требования прода
    (deployment_constraints) влияют ТОЛЬКО на ВЫБОР архитектуры — выбери максимально
    подходящую/лёгкую из доступных и обучай на том, что есть. decision ОБЯЗАН быть
    true с валидным конфигом. decision = false допустим ТОЛЬКО если датасет или
    версия физически отсутствуют (инструменты GetDatasetDetails /
    GetDatasetVersionDetails вернули ошибку) — тогда обучать нечего.

    ## АЛГОРИТМ твоих действий

    1. Вызови GetDeviceInfo — это железо для ОБУЧЕНИЯ. Запомни устройство: его
       значение пойдёт в конфиг как "cuda" (если есть GPU) или "cpu". НЕ используй
       "cuda:0".
    2. Вызови GetAllAvailableModels и выбери подходящую архитектуру под задачу
       классификации изображений.
    3. Учти требования прода (deployment_constraints) при ВЫБОРЕ архитектуры
       (скорость, память, размер модели). Эти требования — про инференс в проде, они
       влияют на ВЫБОР архитектуры, а не на устройство обучения. Сами по себе они НЕ
       являются основанием для отказа.
    4. Проверь, что датасет существует: вызови GetDatasetDetails по ID {dataset_id}.
       Затем проверь, что нужная версия существует: вызови GetDatasetVersionDetails
       с ID {dataset_id} и версией {dataset_version_id}.
       Если датасет или версия не найдены (инструмент вернул ошибку) — обучение
       запускать НЕЛЬЗЯ: верни decision = false и укажи в reason, чего именно нет.
    5. Прими решение (по разделу «ПОЛИТИКА РЕШЕНИЯ» — отказ только при отсутствии данных).
    6. Просмотри доступные метрики GetMetricsForTrainer.
    7. Создай конфигурацию через GetExampleTrainingConfig и заполни её:
       - имя модели — из GetAllAvailableModels (timm);
       - в поля датасета/версии подставь реальные {dataset_id} и {dataset_version_id}
         (а не значения-заглушки из примера);
       - устройство — из шага 1 ("cuda" или "cpu");
       - оптимизаторы/планировщики/метрики — строго из ответов инструментов.
    8. ОБЯЗАТЕЛЬНО проверь готовую конфигурацию инструментом ValidateTrainingConfig.
       Если valid == false — исправь конфигурацию по списку errors и проверь снова.
       Не отдавай конфигурацию, не прошедшую валидацию.

    Названия всех оптимизаторов и планировщиков используй строго из полученных данных
    из инструментов.

  expected_output: |
    Твой ответ должен быть строго в формате JSON, который соответствует схеме:

    {
      "decision": true/false,
      "reason": "Развёрнутое обоснование решения",
      "ml_model": {
        "description_model": "Описание модели",
        "type": "тип модели (например, CNN, ResNet, Transformer)",
        "configuration": "JSON конфигурация для обучения"
      },
      "recommendations": "Рекомендации по улучшению"
    }

    ВАЖНО:
    - Если decision == false, то ml_model должен быть null
    - Если decision == true, ml_model обязателен
    - configuration — это валидный JSON по структуре из GetExampleTrainingConfig
      (структуру не придумывай — бери из ответа инструмента)
    - configuration обязана пройти проверку ValidateTrainingConfig (valid == true)
      до того, как ты отдашь ответ
    - В configuration подставь реальные {dataset_id} и {dataset_version_id} в поля
      датасета/версии, а устройство задай как "cuda" или "cpu" (не "cuda:0")
    - Используй ТОЛЬКО те оптимизаторы и планировщики, которые вернули инструменты
    - Не добавляй пояснений вне JSON — только чистый JSON объект

    Пример ответа при успехе (configuration сокращён — у тебя он полный из инструмента):
    {
      "decision": true,
      "reason": "ResNet50 подходит по требованиям к памяти и скорости",
      "ml_model": {
        "description_model": "ResNet50 для классификации изображений",
        "type": "CNN",
        "configuration": "<полный JSON из GetExampleTrainingConfig с реальными dataset_id/version_id и device>"
      },
      "recommendations": "Использовать аугментацию данных"
    }

    Пример ответа при отказе (только если датасет/версия не найдены):
    {
      "decision": false,
      "reason": "Версия датасета не найдена — обучать нечего",
      "ml_model": null,
      "recommendations": "Проверьте корректность ID версии датасета"
    }
