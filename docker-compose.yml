services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
  
  data_manipulation_service:
    build: 
      context: ./data_manipulation_service
    ports:
      - "8000:8000"
    volumes:
      - ./datasets_storage:/app/datasets
  
  # experiment_orchestrator:
    # Todo

  tasker_service:
    build: 
      context: ./tasker_service
    ports:
      - "1000:1000"

  trainer_service:
    build: 
      context: ./trainer_service
    network_mode: "host"

  metrics_service:
    build: 
      context: ./metrics_service
    ports:
      - "3000:3000"

