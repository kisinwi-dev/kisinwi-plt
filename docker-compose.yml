services:
  frontend:
    container_name: 
      frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - DMS=localhost:${DATASETS_SERVICE_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    networks:
      - network
    depends_on:
      - datasets

  # =============================================================
  # Сервис для работы с датасетами
  # =============================================================
  
  datasets:
    container_name: 
      datasets
    build: 
      context: ./services/datasets
      dockerfile: Dockerfile
    volumes:
      - ./db/datasets_storage:/app/datasets
    ports:
      - "${DATASETS_SERVICE_PORT}:${DATASETS_SERVICE_PORT}"
    networks:
      - network

  # =============================================================
  # Сервис задач
  # =============================================================

  tasker:
    container_name: 
      tasker
    build: 
      context: ./services/tasker
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=tasker_postgres
      - POSTGRES_PORT=${TASKER_POSTGRES_PORT}
      - POSTGRES_DB=${TASKER_POSTGRES_DB}
      - POSTGRES_APP_USERNAME=${TASKER_POSTGRES_USER}
      - POSTGRES_APP_PASSWORD=${TASKER_POSTGRES_PASSWORD}
    ports:
      - "${TASKER_PORT}:${TASKER_PORT}"
    networks:
      - network
    depends_on:
      tasker_postgres:
        condition: service_healthy

  tasker_postgres:
    image: postgres:17-alpine
    container_name: 
      tasker_postgres
    restart: unless-stopped
    command: -p ${TASKER_POSTGRES_PORT}
    environment:
      POSTGRES_USER: ${TASKER_POSTGRES_ROOT_USERNAME}
      POSTGRES_PASSWORD: ${TASKER_POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: ${TASKER_POSTGRES_DB}
      APP_USER: ${TASKER_POSTGRES_USER}
      APP_PASSWORD: ${TASKER_POSTGRES_PASSWORD}
    ports:
      - "${TASKER_POSTGRES_PORT}:${TASKER_POSTGRES_PORT}"
    volumes:
      - ./db/postgres/tasker/data:/var/lib/postgresql/data
      - ./db/postgres/tasker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TASKER_POSTGRES_ROOT_USERNAME} -d ${TASKER_POSTGRES_DB} -p ${TASKER_POSTGRES_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - network

  # =============================================================
  # Сервис ML моделей
  # =============================================================

  ml_models:
    container_name: 
      ml_models
    build: 
      context: ./services/ml_models
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=ml_models_postgres
      - POSTGRES_PORT=${ML_MODELS_POSTGRES_PORT}
      - POSTGRES_DB=${ML_MODELS_POSTGRES_DB}
      - POSTGRES_APP_USERNAME=${ML_MODELS_POSTGRES_USER}
      - POSTGRES_APP_PASSWORD=${ML_MODELS_POSTGRES_PASSWORD}
    ports:
      - "${ML_MODELS_SERVICE_PORT}:${ML_MODELS_SERVICE_PORT}"
    volumes:
      - ./db/model_files:/app/model_files
    networks:
      - network
    depends_on:
      ml_models_postgres:
        condition: service_healthy

  ml_models_postgres:
    image: postgres:17-alpine
    container_name: 
      ml_models_postgres
    restart: unless-stopped
    command: -p ${ML_MODELS_POSTGRES_PORT}
    environment:
      POSTGRES_USER: ${ML_MODELS_POSTGRES_ROOT_USERNAME}
      POSTGRES_PASSWORD: ${ML_MODELS_POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: ${ML_MODELS_POSTGRES_DB}
      APP_USER: ${ML_MODELS_POSTGRES_USER}
      APP_PASSWORD: ${ML_MODELS_POSTGRES_PASSWORD}
    ports:
      - "${ML_MODELS_POSTGRES_PORT}:${ML_MODELS_POSTGRES_PORT}"
    volumes:
      - ./db/postgres/ml_models/data:/var/lib/postgresql/data
      - ./db/postgres/ml_models/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ML_MODELS_POSTGRES_ROOT_USERNAME} -d ${ML_MODELS_POSTGRES_DB} -p ${ML_MODELS_POSTGRES_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - network


  # =============================================================
  # Сервис тренировок
  # =============================================================
    
  trainer:
    container_name: 
      trainer
    build: 
      context: ./services/trainer
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./db/datasets_storage:/app/datasets
    ports:
      - "${TRAINER_SERVICE_PORT}:${TRAINER_SERVICE_PORT}"
    environment:
      - TASKER_DOMAIN=tasker:${TASKER_PORT}
      - METRICS_DOMAIN=metrics:${METRICS_SERVICE_PORT}
      - ML_MODELS_DOMAIN=ml_models:${ML_MODELS_SERVICE_PORT}
    depends_on:
      - metrics
      - tasker
    networks:
      - network
    shm_size: 2gb

  # =============================================================
  # Сервис метрик
  # =============================================================

  metrics:
    container_name: 
      metrics
    build:
      context: ./services/metrics
      dockerfile: Dockerfile
    environment:
      - MONGO_HOST=metrics_mongo
      - MONGO_PORT=${METRICS_MONGO_PORT}
      - MONGO_APP_USERNAME=${METRICS_MONGO_APP_USERNAME}
      - MONGO_APP_PASSWORD=${METRICS_MONGO_APP_PASSWORD}
      - MONGO_METRIC_DATABASE=${METRICS_MONGO_INITDB_ROOT_USERNAME}
    ports: 
      - "${METRICS_SERVICE_PORT}:${METRICS_SERVICE_PORT}"
    networks:
      - network
    depends_on:
      metrics_mongo:
        condition: service_healthy

  metrics_mongo:
    image: mongo:8.2.7
    container_name: metrics_mongo
    command: --port ${METRICS_MONGO_PORT}
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${METRICS_MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${METRICS_MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${METRICS_MONGO_INITDB_ROOT_USERNAME}
      - MONGO_APP_USERNAME=${METRICS_MONGO_APP_USERNAME}
      - MONGO_APP_PASSWORD=${METRICS_MONGO_APP_PASSWORD}
    ports:
      - "${METRICS_MONGO_PORT}:${METRICS_MONGO_PORT}"
    volumes:
      - ./db/mongodb/data:/data/db
      - ./db/mongodb/config:/data/configdb
      - ./db/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - network
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${METRICS_MONGO_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =============================================================
  # Сервис агентов
  # =============================================================

  agents:
    container_name: 
      agents
    build: 
      context: ./services/agents
      dockerfile: Dockerfile
    ports:
      - "${AGENT_OFFICE_PORT}:${AGENT_OFFICE_PORT}"
    environment:
      - DMS_DOMEN=datasets:${DATASETS_SERVICE_PORT}
      - TASKER_DOMEN=tasker:${TASKER_PORT}
      - TRAINER_DOMEN=trainer:${TRAINER_SERVICE_PORT}
      - METRICS_DOMEN=metrics:${METRICS_SERVICE_PORT}
      - ML_MODELS_DOMEN=ml_models:${ML_MODELS_SERVICE_PORT}
    networks:
      - network

networks:
  network:
    driver: bridge
    name: network
