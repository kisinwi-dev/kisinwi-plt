services:
  frontend:
    container_name: 
      frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - DMS=localhost:${DATASETS_SERVICE_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    networks:
      - network
    depends_on:
      - datasets
    
  
  datasets:
    container_name: 
      datasets
    build: 
      context: ./services/datasets
      dockerfile: Dockerfile
    volumes:
      - ./db/datasets_storage:/app/datasets
    ports:
      - "${DATASETS_SERVICE_PORT}:${DATASETS_SERVICE_PORT}"
    networks:
      - network


  tasker:
    container_name: 
      tasker
    build: 
      context: ./services/tasker
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=data_postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_APP_USERNAME=${APP_TASKER_USER}
      - POSTGRES_APP_PASSWORD=${APP_TASKER_PASSWORD}
    ports:
      - "${TASKER_PORT}:${TASKER_PORT}"
    networks:
      - network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: 
      data_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_TASKER_USER: ${APP_TASKER_USER}
      APP_TASKER_PASSWORD: ${APP_TASKER_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./db/postgres/data:/var/lib/postgresql/data
      - ./db/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USERNAME} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - network
    
  trainer:
    container_name: 
      trainer
    build: 
      context: ./services/trainer
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./db/datasets_storage:/app/datasets
    ports:
      - "${TRAINER_SERVICE_PORT}:${TRAINER_SERVICE_PORT}"
    environment:
      - TASKER_DOMAIN=tasker:${TASKER_PORT}
      - METRICS_DOMAIN=metrics:${METRICS_SERVICE_PORT}
    depends_on:
      - metrics
      - tasker
    networks:
      - network
    shm_size: 2gb

  mongodb:
    image: mongo:8.2.7
    container_name: data_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
      - MONGO_APP_USERNAME=${MONGO_APP_USERNAME}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - ./db/mongodb/data:/data/db
      - ./db/mongodb/config:/data/configdb
      - ./db/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  metrics:
    container_name: 
      metrics
    build:
      context: ./services/metrics
      dockerfile: Dockerfile
    environment:
      - MONGO_HOST=data_mongodb
      - MONGO_PORT=${MONGO_PORT}
      - MONGO_APP_USERNAME=${MONGO_APP_USERNAME}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
      - MONGO_METRIC_DATABASE=${MONGO_INITDB_DATABASE}
    ports: 
      - "${METRICS_SERVICE_PORT}:${METRICS_SERVICE_PORT}"
    networks:
      - network
    depends_on:
      mongodb:
        condition: service_healthy


  agents:
    container_name: 
      agents
    build: 
      context: ./services/agents
      dockerfile: Dockerfile
    ports:
      - "${AGENT_OFFICE_PORT}:${AGENT_OFFICE_PORT}"
    environment:
      - DMS_DOMEN=datasets:${DATASETS_SERVICE_PORT}
      - TASKER_DOMEN=tasker:${TASKER_PORT}
      - TRAINER_DOMEN=trainer:${TRAINER_SERVICE_PORT}
    networks:
      - network


networks:
  network:
    driver: bridge
    name: network
